services:
  postgres:
    image: postgres:16
    container_name: medaction-postgres
    restart: always
    # IMPORTANT: Désactive les unix sockets pour éviter les erreurs "Permission denied" sur Proxmox
    command: postgres -c unix_socket_directories=''
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medaction}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medaction_secure_2024}
      POSTGRES_DB: ${POSTGRES_DB:-medaction}
      POSTGRES_HOST_AUTH_METHOD: md5
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # On utilise le disque local pour la DB (plus stable sur Proxmox)
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432" # Alignement avec le port par défaut pour éviter le conflit
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U medaction -d medaction -h 127.0.0.1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - medaction-network

  app:
    # Option A: Build sur le serveur (Recommandé si Docker local HS)
    build:
      context: .
      dockerfile: Dockerfile
    image: medaction-app:latest
    container_name: medaction-app
    restart: unless-stopped
    user: "0:0" # Forcer root pour écrire sur les montages Proxmox restrictifs
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      # Mettez l'URL interne du réseau Docker
      - DATABASE_URL=postgresql://medaction:medaction_secure_2024@postgres:5432/medaction
      - NEXTAUTH_URL=https://bo.provincemediouna.ma
      - NEXTAUTH_URL_INTERNAL=http://127.0.0.1:3000
      - NEXTAUTH_SECRET=votre_secret_prod_complexe_a_changer
      - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN}
      # Licence
      - LICENSE_KEY=MED-56CB-ED6B-3E5E-376D
      - LICENSE_DOMAINS=localhost,127.0.0.1,192.168.1.41,bo.provincemediouna.ma,mediouna.gov.ma
      - LICENSE_EXPIRY=2027-02-26
      # Indiquer à l'API d'upload d'utiliser ce chemin
      - STORAGE_PATH=/app/public/uploads
    ports:
      - "3000:3000"
    volumes:
      - medaction_uploads:/app/public/uploads
    networks:
      - medaction-network

volumes:
  medaction_uploads:
    external: true

networks:
  medaction-network:
    driver: bridge
