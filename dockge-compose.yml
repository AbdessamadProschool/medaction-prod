version: "3.8"

# ══════════════════════════════════════════════════════════════════
# BLOC 4.1 — CVE: docker.sock exposure hardening
#
# The original config mounted /var/run/docker.sock directly into the
# Dockge container, giving it full root access to the host Docker daemon.
#
# Fix: use docker-socket-proxy (Tecnativa) as a read-only intermediary.
# It exposes only the API endpoints Dockge actually needs (containers,
# images, stacks), blocking all dangerous endpoints (exec, build, etc.)
#
# If you NEED the raw socket (e.g. for stack management), see the
# commented DOCKGE_STACKS_DIR section below.
# ══════════════════════════════════════════════════════════════════

services:
  # ── Socket Proxy (least-privilege Docker API gateway) ──────────
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: medaction-socket-proxy
    restart: unless-stopped
    environment:
      # Allow only what Dockge requires — everything else is DENIED (0)
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      NETWORKS: 1
      VOLUMES: 1
      SERVICES: 1
      TASKS: 1
      SWARM: 0      # No swarm management
      EXEC: 0       # ← critical: block remote code execution
      BUILD: 0
      COMMIT: 0
      SECRETS: 0
      CONFIGS: 0
      NODES: 0
      PLUGINS: 0
      DISTRIBUTION: 0
      POST: 1       # Dockge needs POST to start/stop containers
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dockge-internal
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # ── Dockge Stack Manager ────────────────────────────────────────
  dockge:
    image: louislam/dockge:1
    container_name: medaction-dockge
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"   # Bind to localhost only — do NOT expose to 0.0.0.0
    depends_on:
      - docker-socket-proxy
    volumes:
      # NO direct docker.sock — proxy is used instead
      - ./dockge-data:/app/data
      - ./:/opt/stacks/medaction
    environment:
      DOCKGE_STACKS_DIR: /opt/stacks
      # Point to the socket proxy instead of the raw socket
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    networks:
      - dockge-internal
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

networks:
  dockge-internal:
    driver: bridge
    internal: true   # This network has no external internet access
